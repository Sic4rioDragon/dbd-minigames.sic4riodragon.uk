<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DBD Mini Games</title>
  <link rel="icon" type="image/png" href="https://sic4riodragon.uk/assets/SicarioDragon.png" />
  <link rel="apple-touch-icon" href="https://sic4riodragon.uk/assets/SicarioDragon.png" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
</head>
<body>
<main
  class="game-page"
  data-game-mode="classic"
  data-rounds-path="../../assets/data/rounds/quote.json"
  data-killers-path="https://deadbydaylight.sic4riodragon.uk/killers.json"
  data-survivors-path="https://deadbydaylight.sic4riodragon.uk/survivors.json"
  data-dbd-assets-base="https://deadbydaylight.sic4riodragon.uk/"
>
    <section class="play-panel compact-panel">
      <div class="top-row">
        <a class="back-link" href="../../">← Back home</a>
        <span class="mode-label">Demo Mode · <span id="siteVersion">v0.0.1</span></span>
      </div>

      <h1 id="modeTitle">Loading...</h1>

      <div class="clue-box compact-clue">
        <p class="clue-title">Clue</p>
        <p class="clue-text" id="clueText">Loading...</p>
        <p class="helper-text" id="helperText"></p>
      </div>

      <div class="answer-row">
        <input class="answer-input" id="answerInput" placeholder="Type your guess..." autocomplete="off" />
        <button id="submitBtn">Submit</button>
      </div>

      <div class="result-box" id="result"></div>

      <div class="score-row compact-score">
        <span class="score-pill" id="scoreText">Score 0</span>
        <span class="score-pill" id="playedText">Played 0</span>
        <span class="score-pill" id="bestText">Best 0</span>
        <span class="score-pill" id="leftText">Left 0</span>
        <span class="score-pill" id="triesText">Try 0/3</span>
      </div>

      <div class="action-row">
        <button class="secondary-btn" id="nextBtn">Next round</button>
        <button class="secondary-btn" id="resetBtn">Reset</button>
      </div>
    </section>
  </main>

  <script src="../../assets/js/app.js"></script>
</body>
</html>
